<head>

  <title>Blog - Siddhesh Badnapurkar</title>
  <meta name="description" content="Writing on systems, algorithms, and machine learning.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="alternate" type="application/atom+xml" title="Siddhesh Badnapurkar" href="https://51ddhesh.github.io/atom.xml">
  
  <style>
    :root {
      --bg:         #0d0d0d;
      --surface:    #141414;
      --border:     #1e1e1e;
      --muted:      #555;
      --text:       #c8c8c8;
      --heading:    #f0f0f0;
      --accent:     #7c9ab8;
      --accent-dim: rgba(124, 154, 184, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    .site-nav {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 72px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .site-nav .home-link {
      font-size: 15px;
      font-weight: 700;
      color: var(--heading);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-nav .home-link:hover { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 24px;
    }

    .nav-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::before { content: '//'; color: var(--accent); }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .site-footer {
      font-size: 11px;
      color: var(--muted);
      padding-top: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 80px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

  </style>
    
<style>
  .post-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    text-decoration: none;
    transition: color 0.2s;
  }

  .post-item:first-of-type { border-top: 1px solid var(--border); }

  .post-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--heading);
    transition: color 0.2s;
  }

  .post-item:hover .post-title { color: var(--accent); }

  .post-meta {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .post-desc {
    font-size: 12px;
    color: var(--text);
    margin-top: 4px;
  }

  .post-left { min-width: 0; }

  .post-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(124, 154, 184, 0.18);
    padding: 2px 8px;
    border-radius: 2px;
  }

  .empty {
    font-size: 13px;
    color: var(--muted);
    padding: 18px 0;
    border-top: 1px solid var(--border);
  }

</style>
  
</head>

            <div class="post-tags">
              
                <span class="tag">Rust</span>

  </div>

  
</body>
