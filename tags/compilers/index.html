    :root {
      --bg:         #0d0d0d;
      --surface:    #141414;
      --border:     #1e1e1e;
      --muted:      #555;
      --text:       #c8c8c8;
      --heading:    #f0f0f0;
      --accent:     #7c9ab8;
      --accent-dim: rgba(124, 154, 184, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'JetBrains Mono', monospace;

      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    .site-nav {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 72px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .site-nav .home-link {
      font-size: 15px;
      font-weight: 700;
      color: var(--heading);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-nav .home-link:hover { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 24px;
    }

    .nav-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::before { content: '//'; color: var(--accent); }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .site-footer {
      font-size: 11px;
      color: var(--muted);
      padding-top: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 80px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
