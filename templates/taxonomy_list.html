{% extends "base.html" %}

{% block title %}Tags - {{ config.title }}{% endblock title %}

{% block content %}
  <h2 class="section-label">tags</h2>
  {% for term in terms %}
    <a class="blog-post-link" href="{{ term.permalink }}" style="text-decoration:none;">
      <span style="font-size:13px; color:var(--text);">{{ term.name }}</span>
      <span style="font-size:11px; color:var(--muted);">{{ term.pages | length }} post{% if term.pages | length != 1 %}s{% endif %}</span>
    </a>
  {% endfor %}
{% endblock content %}
